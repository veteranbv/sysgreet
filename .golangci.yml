version: "2"
run:
  modules-download-mode: readonly
  tests: true
linters:
  enable:
    - copyloopvar
    - goconst
    - gocyclo
    - gosec
    - misspell
    - unconvert
    - unparam
  settings:
    goconst:
      min-len: 3
      min-occurrences: 3
    gocyclo:
      min-complexity: 15
    misspell:
      locale: US
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gocyclo
          - gosec
          - unparam
        path: _test\.go
      - linters:
          - staticcheck
        text: cgo-gcc-prolog
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$

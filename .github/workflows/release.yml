name: Release

on:
  push:
    tags:
      - 'v*'
  # Invoked by the Tag Release workflow at the freshly pushed tag; tags
  # created with the default GITHUB_TOKEN do not fire the push trigger.
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Ensure release commit is tagged
        run: |
          if ! git describe --exact-match --tags HEAD >/dev/null 2>&1; then
            echo "::error::No tag at HEAD. Cut releases with the 'Tag Release' workflow; running 'Release' directly only works at a tag ref."
            exit 1
          fi
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
      - name: Run Tests
        env:
          CGO_ENABLED: 0
        run: |
          go test ./...
          go test -bench Startup ./test/benchmarks
      - name: Validate go install path
        run: |
          go install ./cmd/sysgreet
          sysgreet --disable
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

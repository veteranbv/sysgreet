# Sysgreet configuration reference (YAML)
display:
  hostname: true
  os: true
  ip_addresses: true
  remote_ip: true
  uptime: true
  user: true
  memory: true
  disk: true
  load: true
  datetime: true
  last_login: true

ascii:
  # Font options: "ANSI Regular", "ANSI Shadow", "Banner", "Basic", "Block",
  # "Blocks", "DOS Rebel", "Small", "standard", "slant" (or run --list-fonts).
  # When the terminal is too narrow for this font, sysgreet automatically
  # steps down: shorter hostname, then a narrower font, then a plain header.
  font: "ANSI Regular"

  # Gradient: cycle colors per line (overrides 'color' if set)
  gradient: ["brightblue", "blue", "cyan", "brightcyan", "white"]

  # Single color: use one color for entire banner (ignored if gradient is set)
  # color: "cyan"

  # Monochrome: disable all colors
  monochrome: false

layout:
  compact: false
  # Cap the banner width in columns. 0 means use the detected terminal width.
  max_width: 0
  sections:
    - header
    - system
    - network
    - resources

network:
  show_interface_names: true
  max_interfaces: 3
